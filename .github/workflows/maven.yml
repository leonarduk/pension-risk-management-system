# This workflow will build the project and run formatting/lint checks
name: Maven Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          pip install pre-commit
          pip install -r timeseries-python/requirements.txt
          pip install -r timeseries-python/requirements-test.txt
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Run Python tests
        working-directory: timeseries-python
        run: pytest --basetemp=.pytest_tmp
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B verify -Dmaven.test.skip=true -Dspotless.check.skip=true -Dspotbugs.skip=true -Denforcer.skip=true --file pom.xml
      - name: Set up Node.js for Snyk
        uses: actions/setup-node@v4
        if: ${{ env.SNYK_TOKEN != '' }}
        with:
          node-version: "20"
      - name: Install Snyk CLI
        if: ${{ env.SNYK_TOKEN != '' }}
        run: npm install --global snyk
      - name: Run Snyk test for timeseries-lambda dependencies
        if: ${{ env.SNYK_TOKEN != '' }}
        working-directory: .
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=timeseries-lambda/pom.xml --severity-threshold=high
      - name: Log in to container registry
        uses: docker/login-action@v3
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.REGISTRY_URL != '' && env.REGISTRY_USERNAME != '' && env.REGISTRY_PASSWORD != '' }}
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.REGISTRY_URL != '' && env.REGISTRY_USERNAME != '' && env.REGISTRY_PASSWORD != '' }}
        with:
          context: ./timeseries-lambda
          file: ./timeseries-lambda/Dockerfile
          push: true
          tags: ${{ env.REGISTRY_URL }}/pension-risk-management-system/timeseries-lambda:latest
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4
        continue-on-error: true
